name: CodeScene Delta Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  codescene:
    name: CodeScene Delta Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install CodeScene CLI
        run: curl https://downloads.codescene.io/enterprise/cli/install-cs-tool.sh | sh

      - name: Run delta analysis
        env:
          CS_ONPREM_URL: ${{ secrets.CODESCENE_URL }}
          CS_ACCESS_TOKEN: ${{ secrets.CODESCENE_TOKEN }}
        run: cs delta
